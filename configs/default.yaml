# =============================================================================
# Kill AI Leak - Default Configuration
# =============================================================================
# This file provides sensible defaults for all Kill AI Leak components.
# Override individual values via environment variables (KILLAILEAK_*) or by
# supplying a separate config file with --config.
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP Gateway Server
# ---------------------------------------------------------------------------
server:
  # Bind address. Use 0.0.0.0 for all interfaces.
  host: 0.0.0.0
  # Listening port for the gateway.
  port: 8080
  # Maximum duration for reading the entire request (headers + body).
  read_timeout: 30s
  # Maximum duration before timing out writes of the response.
  write_timeout: 30s
  # Grace period for in-flight requests during shutdown.
  shutdown_timeout: 15s

# ---------------------------------------------------------------------------
# Reverse Proxy Settings
# ---------------------------------------------------------------------------
proxy:
  # Size (bytes) of the read/write buffers used when proxying streams.
  buffer_size: 65536
  # Hard limit on request body size (bytes). Requests larger than this are
  # rejected with 413 Payload Too Large. Default: 10 MB.
  max_body_size: 10485760  # 10MB
  # Timeout for establishing a connection to the upstream provider and
  # receiving the full response.
  upstream_timeout: 60s

# ---------------------------------------------------------------------------
# LLM Provider Upstreams
# ---------------------------------------------------------------------------
# Each key is the canonical provider name used in policies and events.
# The gateway routes requests to the matching upstream URL.
providers:
  openai:
    upstream: https://api.openai.com
  anthropic:
    upstream: https://api.anthropic.com
  gemini:
    upstream: https://generativelanguage.googleapis.com
  bedrock:
    upstream: https://bedrock-runtime.us-east-1.amazonaws.com

# ---------------------------------------------------------------------------
# Guardrail Pipeline
# ---------------------------------------------------------------------------
guardrails:
  # Master switch. Set to false to bypass all guardrails (emergency kill-switch).
  enabled: true
  # Default enforcement mode for rules that do not specify their own mode.
  # Values: off | discover | monitor | enforce
  default_mode: monitor
  # Per-stage timeouts. If a stage exceeds its timeout the pipeline moves on.
  # Use Go duration strings (e.g. 5ms, 100ms, 1s). 0 = async/fire-and-forget.
  stage_timeouts:
    pre_input: 5ms
    input: 100ms
    routing: 5ms
    output: 100ms
    post_output: 0  # async, no timeout
  # Execute independent rules within a stage in parallel.
  parallel_execution: true
  # Stop the pipeline immediately when a rule issues a BLOCK decision,
  # skipping remaining rules in the stage.
  short_circuit: true

# ---------------------------------------------------------------------------
# Storage Backends
# ---------------------------------------------------------------------------
storage:
  # ClickHouse is the primary store for events and analytics.
  clickhouse:
    dsn: tcp://localhost:9000/kill_ai_leak
  # PostgreSQL stores policies, inventory, and configuration state.
  postgresql:
    dsn: postgres://localhost:5432/kill_ai_leak?sslmode=disable
  # Redis provides caching, rate-limit counters, and session state.
  redis:
    addr: localhost:6379
  # NATS is the event bus between gateway, processor, and API server.
  nats:
    url: nats://localhost:4222

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  # Minimum log level: debug | info | warn | error
  level: info
  # Output format: json | text
  format: json
