## Kill-AI-Leak — Local development configuration
## Usage: go run ./cmd/gateway --config configs/local.yaml

server:
  host: 127.0.0.1
  port: 8080
  read_timeout: 30s
  write_timeout: 60s
  idle_timeout: 120s
  shutdown_timeout: 5s
  max_request_body_mb: 10

proxy:
  default_timeout: 30s

guardrails:
  enabled: true
  default_mode: enforce

logging:
  level: debug
  format: json

auth:
  enabled: false  # no APP-ID required for local dev
