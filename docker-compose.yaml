services:
  gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.gateway
    ports: ["8080:8080"]
    environment:
      KILLAI_LOG_LEVEL: info
      KILLAI_AUTH_ENABLED: "false"
      ML_SERVER_URL: "http://ml-server:5000"
    depends_on: [redis, nats, ml-server]

  ml-server:
    build:
      context: ./ml/server
      dockerfile: Dockerfile
    ports: ["5000:5000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports: ["4222:4222"]

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    depends_on: [gateway]
