{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kill-ai-leak.fullname" . }}-dashboard
  labels:
    {{- include "kill-ai-leak.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.dashboard.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kill-ai-leak.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
{{- end }}
