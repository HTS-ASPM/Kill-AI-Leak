{{- if .Values.mcpGateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kill-ai-leak.fullname" . }}-mcp-gateway
  labels:
    {{- include "kill-ai-leak.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gateway
spec:
  replicas: {{ .Values.mcpGateway.replicas }}
  selector:
    matchLabels:
      {{- include "kill-ai-leak.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp-gateway
  template:
    metadata:
      labels:
        {{- include "kill-ai-leak.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-gateway
    spec:
      serviceAccountName: {{ include "kill-ai-leak.serviceAccountName" . }}
      containers:
        - name: mcp-gateway
          image: "{{ .Values.mcpGateway.image.repository }}:{{ .Values.mcpGateway.image.tag }}"
          imagePullPolicy: {{ .Values.mcpGateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mcpGateway.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: GATEWAY_URL
              value: "http://{{ include "kill-ai-leak.fullname" . }}-gateway:{{ .Values.gateway.port }}"
{{- end }}
