apiVersion: v1
kind: Service
metadata:
  name: {{ include "kill-ai-leak.fullname" . }}-gateway
  labels:
    {{- include "kill-ai-leak.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kill-ai-leak.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
