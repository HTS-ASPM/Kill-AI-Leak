<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kill-AI-Leak</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 380px;
      min-height: 480px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      font-size: 13px;
    }

    /* --- Header --- */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
    }
    .header-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #e94560, #f77f00);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
    }
    .header-badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-protected { background: #16a34a; color: #fff; }
    .badge-unprotected { background: #eab308; color: #000; }
    .badge-blocked { background: #e94560; color: #fff; }
    .badge-unknown { background: #475569; color: #fff; }

    /* --- Status section --- */
    .section {
      padding: 14px 18px;
      border-bottom: 1px solid #1e1e3a;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    /* --- Current page --- */
    .current-page {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .page-info { flex: 1; }
    .page-provider {
      font-weight: 600;
      font-size: 14px;
    }
    .page-domain {
      font-size: 11px;
      color: #888;
    }
    .page-decision {
      font-size: 11px;
      margin-top: 2px;
    }

    /* --- Toggle --- */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }
    .toggle-label { font-weight: 500; }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #475569;
      border-radius: 12px;
      transition: 0.2s;
    }
    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: #16a34a;
    }
    .toggle-switch input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }

    /* --- Usage summary --- */
    .usage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .usage-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .usage-value {
      font-size: 22px;
      font-weight: 700;
      color: #f0f0f0;
    }
    .usage-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* --- Tool list --- */
    .tool-list { list-style: none; }
    .tool-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #1e1e3a;
    }
    .tool-item:last-child { border-bottom: none; }
    .tool-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .tool-dot-chat { background: #3b82f6; }
    .tool-dot-code { background: #a855f7; }
    .tool-dot-image { background: #f97316; }
    .tool-dot-search { background: #16a34a; }
    .tool-dot-api { background: #e94560; }
    .tool-dot-other { background: #888; }
    .tool-name { flex: 1; font-weight: 500; }
    .tool-count {
      font-size: 11px;
      color: #888;
      background: #2a2a4a;
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* --- Actions --- */
    .actions {
      display: flex;
      gap: 8px;
      padding: 14px 18px;
    }
    .btn {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.15s;
      text-decoration: none;
      display: block;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-secondary { background: #334155; color: #e0e0e0; }
    .btn-warning { background: #eab308; color: #000; }

    /* --- Settings --- */
    .settings-group { margin-top: 6px; }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .settings-row label { font-size: 12px; }
    .settings-row select {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
    }

    /* --- Footer --- */
    .footer {
      padding: 10px 18px;
      text-align: center;
      font-size: 10px;
      color: #555;
      border-top: 1px solid #1e1e3a;
    }
    .footer a {
      color: #3b82f6;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    .empty-state {
      text-align: center;
      padding: 16px 0;
      color: #666;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-logo">K</div>
    <div class="header-title">Kill-AI-Leak</div>
    <span id="status-badge" class="header-badge badge-unknown">Loading</span>
  </div>

  <!-- Current page status -->
  <div class="section">
    <div class="section-title">Current Page</div>
    <div class="current-page">
      <div class="page-icon" id="page-icon">?</div>
      <div class="page-info">
        <div class="page-provider" id="page-provider">Not an AI site</div>
        <div class="page-domain" id="page-domain">--</div>
        <div class="page-decision" id="page-decision"></div>
      </div>
    </div>
  </div>

  <!-- Protection toggle -->
  <div class="section">
    <div class="toggle-row">
      <span class="toggle-label">Protection</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-protection" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- Usage summary -->
  <div class="section">
    <div class="section-title">Today's AI Usage</div>
    <div class="usage-grid">
      <div class="usage-card">
        <div class="usage-value" id="total-tools">0</div>
        <div class="usage-label">AI Tools</div>
      </div>
      <div class="usage-card">
        <div class="usage-value" id="total-prompts">0</div>
        <div class="usage-label">Requests</div>
      </div>
    </div>
    <ul class="tool-list" id="tool-list">
      <li class="empty-state">No AI tools used today.</li>
    </ul>
  </div>

  <!-- Settings -->
  <div class="section">
    <div class="section-title">Settings</div>
    <div class="settings-group">
      <div class="settings-row">
        <label>Sensitivity</label>
        <select id="sensitivity-level">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="settings-row">
        <label>Notifications</label>
        <label class="toggle-switch" style="width:38px; height:20px;">
          <input type="checkbox" id="toggle-notifications" checked>
          <span class="toggle-slider" style="border-radius:10px;"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button id="btn-allow-temp" class="btn btn-warning" disabled>Allow This Site</button>
    <a href="#" id="btn-dashboard" class="btn btn-primary">Open Dashboard</a>
  </div>

  <!-- Footer -->
  <div class="footer">
    Kill-AI-Leak v1.0.0 &mdash; <a href="#" id="link-dashboard">Full Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
